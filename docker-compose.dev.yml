# docker-compose.dev.yml — Apenas infraestrutura para desenvolvimento local
# Uso: docker compose -f docker-compose.dev.yml up -d
# Depois rode o frontend e backend localmente com hot reload

services:
  postgres:
    image: postgres:16-alpine
    container_name: viego-postgres
    environment:
      POSTGRES_USER: viego
      POSTGRES_PASSWORD: viego_secret_2024
      POSTGRES_DB: viegomains
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viego -d viegomains"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: viego-clickhouse
    environment:
      CLICKHOUSE_DB: viegomains
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./backend/migrations/clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: viego-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: viego-nats
    command: ["--jetstream", "--monitor", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
