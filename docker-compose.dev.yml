version: "3.9"

services:
  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./public:/var/www/public:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - NODE_ENV=development
    ports:
      - "3001:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm start

  riot-gateway:
    ports:
      - "8001:8001"
    volumes:
      - ./backend/services/riot-gateway:/app
      - ./backend/internal:/app/internal
    environment:
      - PORT=8001
      - RIOT_API_KEY=${RIOT_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=debug

  champion-svc:
    ports:
      - "8002:8002"
    volumes:
      - ./backend/services/champion-svc:/app
      - ./backend/internal:/app/internal
    environment:
      - PORT=8002
      - POSTGRES_URL=postgres://viego:viego_pass@postgres:5432/viego_db
      - REDIS_URL=redis://redis:6379/1
      - LOG_LEVEL=debug

  player-svc:
    ports:
      - "8003:8003"
    volumes:
      - ./backend/services/player-svc:/app
      - ./backend/internal:/app/internal
    environment:
      - PORT=8003
      - POSTGRES_URL=postgres://viego:viego_pass@postgres:5432/viego_db
      - REDIS_URL=redis://redis:6379/2
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=debug

  analytics-svc:
    ports:
      - "8004:8004"
    volumes:
      - ./backend/services/analytics-svc:/app
      - ./backend/internal:/app/internal
    environment:
      - PORT=8004
      - CLICKHOUSE_URL=http://clickhouse:8123
      - POSTGRES_URL=postgres://viego:viego_pass@postgres:5432/viego_db
      - REDIS_URL=redis://redis:6379/3
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=debug

  leaderboard-svc:
    ports:
      - "8005:8005"
    volumes:
      - ./backend/services/leaderboard-svc:/app
      - ./backend/internal:/app/internal
    environment:
      - PORT=8005
      - POSTGRES_URL=postgres://viego:viego_pass@postgres:5432/viego_db
      - REDIS_URL=redis://redis:6379/4
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=debug

  content-svc:
    ports:
      - "8006:8006"
    volumes:
      - ./backend/services/content-svc:/app
      - ./backend/internal:/app/internal
    environment:
      - PORT=8006
      - POSTGRES_URL=postgres://viego:viego_pass@postgres:5432/viego_db
      - REDIS_URL=redis://redis:6379/5
      - LOG_LEVEL=debug

  data-worker:
    volumes:
      - ./backend/workers/data-worker:/app
      - ./backend/internal:/app/internal
    environment:
      - POSTGRES_URL=postgres://viego:viego_pass@postgres:5432/viego_db
      - CLICKHOUSE_URL=http://clickhouse:8123
      - REDIS_URL=redis://redis:6379/6
      - NATS_URL=nats://nats:4222
      - RIOT_API_KEY=${RIOT_API_KEY}
      - LOG_LEVEL=debug

  postgres:
    ports:
      - "5432:5432"

  clickhouse:
    ports:
      - "8123:8123"
      - "9000:9000"

  redis:
    ports:
      - "6379:6379"

  nats:
    ports:
      - "4222:4222"
      - "8222:8222"

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3000:3000"
